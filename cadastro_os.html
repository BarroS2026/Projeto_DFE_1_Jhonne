<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G@meService - Cadastrar OS</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/cadastro_os.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="brand-text">
        <h1>Game Service</h1>
        <p>Sistema de Ordem de Serviço</p>
      </div>
      <button class="menu-toggle" id="menuToggle">☰</button>
      <ul id="menuLinks">
        <li><a href="dashboard.html">Painel Principal</a></li>
        <li><a href="cadastro_os.html">Cadastrar OS</a></li>
        <li><a href="cadastro_clientes.html">Cadastrar Cliente</a></li>
        <li><a href="index.html">Sair</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="formulario">
      <h2>Cadastro de Ordem de Serviço</h2>
      <form id="formOS">
        <label for="cliente">Cliente:</label>
        <select id="cliente" name="cliente" required>
          <option value="">Selecione um cliente</option>
        </select>

        <label for="equipamento">Equipamento:</label>
        <input type="text" id="equipamento" name="equipamento" placeholder="Digite o equipamento" required>

        <label for="numeroSerie">Número de Série:</label>
        <input type="text" id="numeroSerie" name="numeroSerie" placeholder="Digite o número de série" required>

        <label for="defeito">Defeito Relatado:</label>
        <textarea id="defeito" name="defeito" placeholder="Descreva o problema" required></textarea>

        <label for="status">Status:</label>
        <select id="status" name="status" required>
          <option value="aberto">Aberto</option>
          <option value="andamento">Em Andamento</option>
          <option value="concluida">Concluída</option>
        </select>

        <button type="submit">Cadastrar OS</button>
      </form>
      <p id="mensagem-os"></p>
    </section>
  </main>

  <script src="js/cadastro_os.js"></script>
  <script src="js/navbar.js"></script>
</body>
</html>
